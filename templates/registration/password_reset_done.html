{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado — KoreBase ERP</title>
    <link rel="stylesheet" href="{% static 'css/erp-style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    body {
        background-color: #0f172a;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
    }
    .auth-wrapper {
        width: 100%;
        max-width: 440px;
        padding: 2rem 1rem;
        box-sizing: border-box;
    }
</style>
<body>
<div class="auth-wrapper">
    <div>
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{% static 'images/logo_no background.png' %}" alt="KoreBase"
                style="height: 60px; margin-bottom: 1rem; object-fit: contain;">
        </div>
        <div style="background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center;">
            <div style="width: 64px; height: 64px; background: rgba(20,184,166,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-envelope-open-text" style="font-size: 1.75rem; color: var(--kore-teal-500);"></i>
            </div>
            <h2 style="color: var(--kore-navy-900); font-size: 1.4rem; font-weight: 600; margin: 0 0 0.75rem;">Revisa tu correo</h2>
            <p style="color: var(--kore-gray-500); font-size: 0.95rem; line-height: 1.6; margin: 0 0 2rem;">
                Si existe una cuenta asociada a ese correo, recibirás un
                enlace para restablecer tu contraseña en los próximos minutos.
                Revisa también tu carpeta de spam.
            </p>
            <a href="{% url 'core:login' %}" style="display: inline-flex; align-items: center; gap: 0.4rem; color: var(--kore-teal-600); font-size: 0.9rem; font-weight: 500; text-decoration: none;">
                <i class="fas fa-arrow-left" style="font-size: 0.8rem;"></i>
                Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
</body>
</html>

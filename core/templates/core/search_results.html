{% if results %}
<div class="kore-search-dropdown" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--kore-gray-200); border-radius: var(--border-radius-md); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-top: 0.5rem; max-height: 400px; overflow-y: auto; z-index: 50;">
    <ul style="list-style: none; padding: 0; margin: 0;">
        {% for item in results %}
        <li>
            <a href="{{ item.url }}" style="display: flex; align-items: center; padding: 0.75rem 1rem; text-decoration: none; border-bottom: 1px solid var(--kore-gray-100); transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='var(--kore-gray-50)'" onmouseout="this.style.backgroundColor='transparent'">
                <div style="width: 32px; height: 32px; border-radius: 6px; background: var(--kore-gray-100); color: var(--kore-teal-500); display: flex; align-items: center; justify-content: center; margin-right: 1rem; flex-shrink: 0;">
                    <i class="fas {{ item.icon }}"></i>
                </div>
                <div>
                    <div style="font-weight: 600; color: var(--kore-navy-900); font-size: 0.9rem;">{{ item.title }}</div>
                    <div style="font-size: 0.75rem; color: var(--kore-gray-500);">{{ item.type }}</div>
                </div>
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% else %}
<div class="kore-search-dropdown" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--kore-gray-200); border-radius: var(--border-radius-md); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-top: 0.5rem; padding: 1.5rem; text-align: center; z-index: 50;">
    <div style="color: var(--kore-gray-400); font-size: 1.5rem; margin-bottom: 0.5rem;"><i class="fas fa-search"></i></div>
    <div style="font-size: 0.9rem; color: var(--kore-gray-600);">No se encontraron resultados</div>
</div>
{% endif %}

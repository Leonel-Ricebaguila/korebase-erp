{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — KoreBase ERP</title>
    <link rel="stylesheet" href="{% static 'css/erp-style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    body {
        background-color: #0f172a;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
    }
    .auth-wrapper {
        width: 100%;
        max-width: 440px;
        padding: 2rem 1rem;
        box-sizing: border-box;
    }
</style>
<body>
<div class="auth-wrapper">
    <div>
        <!-- Brand Header -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{% static 'images/logo_no background.png' %}" alt="KoreBase"
                style="height: 60px; margin-bottom: 1rem; object-fit: contain;">
            <h2 style="color: white; font-weight: 300; font-size: 1.75rem; margin: 0;">Recuperar Contraseña</h2>
            <p style="color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-top: 0.5rem;">
                Ingresa tu correo y te enviaremos un enlace de recuperación
            </p>
        </div>

        <div style="background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
            <form method="post">
                {% csrf_token %}
                <div style="margin-bottom: 1.5rem;">
                    <label for="id_email" style="display: block; font-weight: 600; font-size: 0.875rem; color: var(--kore-navy-900); margin-bottom: 0.5rem;">
                        Correo electrónico
                    </label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--kore-gray-400);"></i>
                        <input type="email" name="email" id="id_email" required
                            placeholder="tu@correo.com"
                            style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; height: 3rem; border: 1px solid var(--kore-gray-200); border-radius: 8px; background: var(--kore-gray-50); font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;">
                    </div>
                </div>

                <button type="submit" style="width: 100%; height: 3rem; font-weight: 600; font-size: 1rem; background: var(--kore-teal-500); color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;">
                    Enviar enlace de recuperación
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--kore-gray-100);">
                <a href="{% url 'core:login' %}" style="color: var(--kore-teal-600); font-size: 0.9rem; font-weight: 500; text-decoration: none;">
                    <i class="fas fa-arrow-left" style="margin-right: 0.4rem; font-size: 0.8rem;"></i>
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
